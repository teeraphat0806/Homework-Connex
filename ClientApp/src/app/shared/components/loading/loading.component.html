@if (loading.isLoading()) {
<div class="loading-container" [class.is-fullscreen]="fullscreen">
  <div class="loading-wrapper">
    
    <div class="loading-spinner"></div>

    @if (text) {
    <p class="loading-text">
      <span>{{text}}</span>
      <span class="loading-dots"></span>
    </p>
    }
  </div>
</div>
}
