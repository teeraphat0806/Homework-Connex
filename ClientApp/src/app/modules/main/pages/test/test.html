<div>
  <homework-dropdown
        [items]="statusItems"
        [useSelectMode]="true"
        [(selectedItemKey)]="currentStatus"
        [type]="typecolor"
        (onItemClick)="changeStatus($event)"
        (selectedItemKeyChange)="currentStatus = $event">
  </homework-dropdown>
  <button (click)="openDeleteModal()">Delete Member</button>
<homework-confirmation-modal
  [(visible)]="isDeleteModalVisible"
  [config]="deleteModalConfig"
  (cancel)="closeDeleteModal()"
>

  <ng-container modal-body>
    <p>
      คุณต้องการลบสินค้า
      <strong>{{ selectedProduct.name }}</strong>
      ใช่หรือไม่?
    </p>

    <p style="color: red; font-size: 13px;">
      เมื่อลบแล้วจะไม่สามารถกู้คืนข้อมูลได้
    </p>
  </ng-container>

  <ng-container modal-footer>
    <homework-button
      label="Cancel"
      theme="Danger"
      stylingMode="outlined"
      (onClick)="closeDeleteModal()"
    >
    </homework-button>
      
    <homework-button
      label="Delete"
      theme="Primary"
      stylingMode="outlined"
      (onClick)="deleteProduct()"
    >
    </homework-button>
  </ng-container>

</homework-confirmation-modal>
  <div style="margin-top: 20px; margin-left: 20px;margin-right: 20px;">
    <homework-order-list></homework-order-list>
  </div>
  <div>
    <homework-member-form></homework-member-form>
  </div>
  <div>
    <homework-order-details></homework-order-details>
  </div>
</div>
