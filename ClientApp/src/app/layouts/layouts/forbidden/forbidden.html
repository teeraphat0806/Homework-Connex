<div class="flex flex-col items-center justify-center min-h-[90svh] px-6 py-12 bg-white">
    <div class="flex flex-col items-center w-full max-w-md">
        <!-- Error Image -->
        <div class="mb-10 w-full transition duration-500 transform hover:scale-105">
            <img src="assets/images/403.png" alt="Forbidden" class="mx-auto w-full h-auto drop-shadow-xl" />
        </div>

        <!-- Text Content -->
        <h1 class="mb-4 text-3xl font-bold tracking-tight text-gray-800 md:text-4xl">
            Access Denied
        </h1>
        
        <p class="mb-10 text-lg leading-relaxed text-center text-gray-500">
            You don't have permission to access this page.
        </p>

        <!-- Action Button -->
        <button (click)="redirectToHome()" 
            class="group relative flex items-center justify-center px-10 py-3.5 bg-[#1E1E1E] text-white rounded-2xl font-semibold text-lg shadow-lg shadow-gray-200 hover:shadow-xl hover:shadow-gray-300 hover:-translate-y-0.5 active:translate-y-0 transition-all duration-300">
            Back to Home
            <svg class="ml-2 w-5 h-5 transition-transform group-hover:translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6" />
            </svg>
        </button>
    </div>
</div>
