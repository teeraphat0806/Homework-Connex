<div class="container-layout">
  <div class="error-card">
    <h1 class="error-code">404</h1>
    <h2 class="error-title">Page Not Found</h2>
    <p class="error-desc">
      We can’t find that page.<br>
      Please check the URL or return to the main dashboard.
    </p>
    <div class="error-actions">
      <button class="btn-cyber-primary" (click)="redirectToHome()">
        Back to Home
        <svg class="icon-arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6" />
        </svg>
      </button>
    </div>
  </div>
</div>
