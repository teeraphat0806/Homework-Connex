<div class="register-container">
  <div class="register-card">

    <div class="register-title">
      Create Account
    </div>

    <div class="register-subtitle">
      สมัครสมาชิกใหม่
    </div>

    <div *ngIf="errorState.hasError('general')" style="color: red; margin-bottom: 15px; text-align: center; font-size: 0.85em;">
      {{ errorState.getError('general')[0] }}
    </div>

    <app-homework-input
      type="Text"
      label="Username"
      placeholder="กรอก Username"
      [fieldValue]="registerData.UserName"
      (fieldValueChange)="registerData.UserName = $event"
      [componentState]="errorState"
      attributeName="Username"
      [isDisabled]="loadingService.isLoading()">
    </app-homework-input>

    <app-homework-input
      type="Password"
      label="Password"
      placeholder="กรอกรหัสผ่าน"
      [fieldValue]="registerData.Password"
      (fieldValueChange)="registerData.Password = $event"
      [componentState]="errorState"
      attributeName="Password"
      [isDisabled]="loadingService.isLoading()">
    </app-homework-input>

    <app-homework-input
      type="Password"
      label="Confirm Password"
      placeholder="ยืนยันรหัสผ่าน"
      [fieldValue]="confirmPassword"
      (fieldValueChange)="confirmPassword = $event"
      [componentState]="errorState"
      attributeName="ConfirmPassword"
      [isDisabled]="loadingService.isLoading()">
    </app-homework-input>

    <div class="register-row">

      <app-homework-input
        type="Text"
        label="First Name"
        placeholder="ชื่อ"
        [fieldValue]="registerData.FirstName"
        (fieldValueChange)="registerData.FirstName = $event"
        [componentState]="errorState"
        attributeName="FirstName"
        [isDisabled]="loadingService.isLoading()">
      </app-homework-input>

      <app-homework-input
        type="Text"
        label="Last Name"
        placeholder="นามสกุล"
        [fieldValue]="registerData.LastName"
        (fieldValueChange)="registerData.LastName = $event"
        [componentState]="errorState"
        attributeName="LastName"
        [isDisabled]="loadingService.isLoading()">
      </app-homework-input>

    </div>

    <div class="register-row">

      <app-homework-input
        type="Number"
        label="Age"
        placeholder="อายุ"
        [fieldValue]="registerData.Age"
        (fieldValueChange)="registerData.Age = $event"
        [componentState]="errorState"
        attributeName="Age"
        [isDisabled]="loadingService.isLoading()">
      </app-homework-input>

      <app-homework-input
        type="Text"
        label="Phone"
        placeholder="เบอร์โทรศัพท์"
        [fieldValue]="registerData.Phone"
        (fieldValueChange)="registerData.Phone = $event"
        [componentState]="errorState"
        attributeName="Phone"
        [isDisabled]="loadingService.isLoading()">
      </app-homework-input>

    </div>

    <app-homework-input
      type="Date"
      label="Birth Date"
      [fieldValue]="registerData.BirthDate"
      (fieldValueChange)="registerData.BirthDate = $event"
      [componentState]="errorState"
      attributeName="BirthDate"
      [isDisabled]="loadingService.isLoading()">
    </app-homework-input>

    <homework-button
      label="สมัครสมาชิก"
      (onClick)="submitRegister()"
      [disabled]="loadingService.isLoading()">
    </homework-button>

  </div>
</div>
